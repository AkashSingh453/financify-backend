ktor {
    deployment {
        port = 8080
        port = ${?PORT}
    }
    application {
        modules = [ com.pikachu.financify.ApplicationKt.module ]
    }
}

database {
    url = ${DATABASE_URL}
    driver = "org.postgresql.Driver"
    user = ${DATABASE_USER}
    password = ${DATABASE_PASSWORD}
    maxPoolSize = 10
}

jwt {
    secret = ${JWT_SECRET}
    issuer = "financify-api"
    audience = "financify-app"
    realm = "Financify"
    expirationMs = 86400000
}

google {
    clientId = ${GOOGLE_CLIENT_ID}
    clientSecret = ${GOOGLE_CLIENT_SECRET}
}